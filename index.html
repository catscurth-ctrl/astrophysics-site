 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Awesome Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 2.5em;
      font-weight: bold;
    }

    nav {
      background: rgba(255,255,255,0.1);
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-size: 1.2em;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00eaff;
    }

    .container {
      padding: 50px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      width: 80%;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00eaff;
      color: black;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00bcd4;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<header>🚀 My Website</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Projects</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Welcome</h2>
    <p>This is my awesome website. I'm learning to code!</p>
    <button onclick="alert('You clicked me!')">Click Me</button>
  </div>
</div>

<footer>
  © 2026 My Website
</footer>

</body>
</html>
