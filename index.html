<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Site</title>

<style>
body {
  margin: 0;
  color: white;
  font-family: Arial;
  text-align: center;
  background: black;
  overflow: hidden;
}

/* animated stars */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  animation: moveStars 60s linear infinite;
  opacity: 0.4;
}

@keyframes moveStars {
  from { transform: translate(0,0); }
  to { transform: translate(-500px,-500px); }
}

header {
  font-size: 3em;
  padding: 40px;
}

.card {
  margin: 50px auto;
  padding: 30px;
  width: 80%;
  max-width: 500px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: cyan;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🌌 My Galaxy Project</header>

<div class="card">
  <h2>Welcome</h2>
  <p>This is my space-themed website 🚀</p>
  <button onclick="alert('Welcome to space!')">Launch</button>
</div>

</body>
</html>
