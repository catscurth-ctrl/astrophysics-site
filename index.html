<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astrophysics Project</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* STAR FIELD (SUBTLE) */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  animation: stars 120s linear infinite;
  opacity: 0.25;
}
@keyframes stars {
  from { transform: translate(0,0); }
  to { transform: translate(-600px,-600px); }
}

/* REALISTIC BLACK HOLE */
.blackhole {
  width: 180px;
  height: 180px;
  margin: 80px auto;
  border-radius: 50%;
  background: radial-gradient(circle, black 70%, #111 90%);
  position: relative;
}

/* ACCRETION DISK */
.blackhole::before {
  content: "";
  position: absolute;
  width: 240px;
  height: 60px;
  top: 60px;
  left: -30px;
  border-radius: 50%;
  background: linear-gradient(
    to right,
    transparent,
    #d4a373,
    white,
    #d4a373,
    transparent
  );
  opacity: 0.6;
  filter: blur(1px);
  animation: disk 20s linear infinite;
}

@keyframes disk {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ORBIT SYSTEM */
.orbit-system {
  width: 400px;
  height: 400px;
  margin: 100px auto;
  position: relative;
}

.sun {
  width: 18px;
  height: 18px;
  background: #fff3b0;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* PLANETS */
.planet {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
}

/* PLANETS (REAL COLORS + SPEEDS) */
.p1 {
  width: 5px;
  height: 5px;
  background: #bbb;
  transform-origin: -60px;
  animation: orbit 6s linear infinite;
}

.p2 {
  width: 7px;
  height: 7px;
  background: #888;
  transform-origin: -100px;
  animation: orbit 10s linear infinite;
}

.p3 {
  width: 9px;
  height: 9px;
  background: #aaa;
  transform-origin: -140px;
  animation: orbit 16s linear infinite;
}

@keyframes orbit {
  from { transform: rotate(0deg) translateX(1px); }
  to { transform: rotate(360deg) translateX(1px); }
}

/* TEXT */
.section {
  max-width: 800px;
  margin: auto;
  padding: 50px 20px;
  line-height: 1.6;
}
</style>
</head>

  <div class="planet p1"></div>

  <div class="planet p3"></div>
</div>
